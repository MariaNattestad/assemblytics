# Recipe for https://github.com/bioconda/bioconda-recipes/tree/master/recipes/assemblytics
# To submit: fork bioconda/bioconda-recipes, copy this file to recipes/assemblytics/meta.yaml, open a PR.

{% set version = "2.0.0" %}

package:
  name: assemblytics
  version: {{ version }}

source:
  url: https://pypi.io/packages/source/a/assemblytics/assemblytics-{{ version }}.tar.gz
  sha256: 76ec02e9a491a606bc1e860eccb734913c172a4516f22c9f023a84b1710e9359

build:
  number: 0
  noarch: python
  script: "{{ PYTHON }} -m pip install . --no-deps --no-build-isolation -vv"
  entry_points:
    - assemblytics = assemblytics.cli:main

requirements:
  host:
    - python >=3.8
    - pip
    - setuptools
  run:
    - python >=3.8
    - numpy
    - pandas
    - matplotlib
    - mummer

test:
  commands:
    - assemblytics --help
  # A fuller smoke test (mirrors the old recipe's intent of running against a small
  # real example) could look like:
  #   - assemblytics -d input_examples/ecoli.delta.gz -o $PWD/test_out -l 1000
  #   - test -s $PWD/test_out/assemblytics_structural_variants.bed

about:
  home: http://assemblytics.com/
  license: MIT
  license_family: MIT
  summary: Detect and analyze structural variants from a de novo genome assembly aligned to a reference genome
  doc_url: https://github.com/MariaNattestad/assemblytics
  dev_url: https://github.com/MariaNattestad/assemblytics

extra:
  recipe-maintainers:
    - MariaNattestad
